<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      /* Failsafe UI Styling - IMPOSSIBLE TO MISS */
      #failsafe-ui {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #101010 0%, #000 100%);
        color: #ff0055;
        font-family: 'Inter', sans-serif;
        z-index: 10000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
        border: 20px solid #ff0055;
      }
      .reset-btn {
        background: #ff0055;
        box-shadow: 0 0 30px #ff0055;
        border: none;
        color: #fff;
        padding: 20px 40px;
        border-radius: 4px;
        font-size: 1.5rem;
        font-weight: 900;
        cursor: pointer;
        margin-top: 30px;
        text-transform: uppercase;
        letter-spacing: 5px;
        transition: all 0.2s;
      }
      .reset-btn:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
    <script>
      // GLOBAL ERROR BOUNDARY PROTOCOL
      window.onerror = function(msg, url, line) {
        showFailsafe("FATAL_BOOT_ERROR: " + msg);
        return false;
      };

      function showFailsafe(reason) {
        const ui = document.getElementById('failsafe-ui');
        if (ui) {
          ui.style.display = 'flex';
          const rEl = document.getElementById('fail-reason');
          if (rEl) rEl.innerText = reason;
        }
      }

      function hardReset() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for(let reg of regs) reg.unregister();
          });
        }
        window.location.reload(true);
      }

      // Detect "Static Black Screen" (Root empty for > 4s)
      window.addEventListener('load', function() {
        setTimeout(function() {
          const root = document.getElementById('root');
          if (root && root.innerHTML === "") {
            showFailsafe("NODE_SYNC_TIMEOUT: Website failed to mount. Stale cache detected.");
          }
        }, 4000);
      });
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOT-CALL | PLATINUM v4.9.9</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Failsafe Error UI -->
    <div id="failsafe-ui">
      <div style="font-size: 5rem; margin-bottom: 20px;">🛡️</div>
      <h1 style="letter-spacing: 10px; font-weight: 900; margin: 0;">RECOVERY_MODE</h1>
      <p id="fail-reason" style="background: rgba(255,0,85,0.1); padding: 10px 20px; border-radius: 4px; margin: 20px 0; font-family: monospace; font-weight: bold;"></p>
      
      <div style="max-width: 600px; text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; font-size: 0.9rem; line-height: 1.6;">
        <p><strong>Penyebab:</strong> Cache browser Anda menyimpan versi lama yang sedang looping.</p>
        <p><strong>Solusi 1:</strong> Klik tombol merah di bawah untuk Hard Reset.</p>
        <p><strong>Solusi 2:</strong> Tekan <strong>CTRL + SHIFT + R</strong> (Shortcut Sakti).</p>
      </div>

      <button class="reset-btn" onclick="hardReset()">PERFORM NUCLEAR RESET</button>
      <p style="margin-top: 30px; font-size: 0.7rem; opacity: 0.5;">BOT-CALL PROTOCOL // STABILITY_ENFORCED_v4.9.9</p>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
