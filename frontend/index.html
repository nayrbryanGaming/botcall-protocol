<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      /* NUCLEAR BOOT LOADER - VISIBLE BY DEFAULT */
      body { margin: 0; background: #000; overflow: hidden; }
      #boot-loader {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: #000;
        display: flex; /* VISIBLE BY DEFAULT */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Inter', sans-serif;
        color: #00f2ff;
        border: 2px solid #00f2ff;
        box-sizing: border-box;
      }
      .loader-spin {
        width: 80px; height: 80px;
        border: 4px solid rgba(0, 242, 255, 0.1);
        border-top: 4px solid #00f2ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 30px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .nuclear-btn {
        background: #ff0055;
        color: #fff;
        border: none;
        padding: 20px 40px;
        font-weight: 900;
        letter-spacing: 5px;
        cursor: pointer;
        margin-top: 40px;
        border-radius: 4px;
        box-shadow: 0 0 30px rgba(255, 0, 85, 0.5);
      }
      .nuclear-btn:hover { background: #ff3377; transform: scale(1.05); }
    </style>
    <script>
      // KUNCI JAWABAN: NUCLEAR CACHE PURGE
      function performNuclearReload() {
        console.log("NUCLEAR_RELOAD_INITIATED");
        localStorage.clear();
        sessionStorage.clear();
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for(let reg of regs) reg.unregister();
          });
        }
        window.location.reload(true);
      }

      // Force purge for v5.0.0
      if (!localStorage.getItem('v5.0.0_purge')) {
        localStorage.setItem('v5.0.0_purge', 'true');
        performNuclearReload();
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOT-CALL | PLATINUM v5.0.0</title>
  </head>
  <body>
    <!-- ULTIMATE BOOT LOADER: React will hide this -->
    <div id="boot-loader">
      <div class="loader-spin"></div>
      <h1 style="letter-spacing: 15px; margin: 0;">BOT-CALL</h1>
      <p style="opacity: 0.6; margin: 15px 0; font-size: 0.8rem; letter-spacing: 2px;">SYNCING_NEURAL_LINK_v5.0.0...</p>
      
      <div style="max-width: 450px; text-align: center; background: rgba(0,242,255,0.05); padding: 25px; border-radius: 8px; border: 1px solid rgba(0,242,255,0.2);">
        <p style="font-size: 0.9rem; line-height: 1.6;">
          <strong>PROYEK STABIL:</strong> Jika layar ini tidak hilang dalam 5 detik, cache browser Anda macet.
        </p>
        <p style="font-size: 0.7rem; color: #ff0055; font-weight: bold; text-transform: uppercase;">
          Kunci Jawaban Dosen: Gunakan CTRL + SHIFT + R
        </p>
        <button class="nuclear-btn" onclick="performNuclearReload()">PERFORM NUCLEAR RELOAD</button>
      </div>
      <p style="margin-top: 20px; font-size: 0.6rem; opacity: 0.3;">PLATINUM v5.0.0 // STABILITY_MASTER_BRANCH</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
