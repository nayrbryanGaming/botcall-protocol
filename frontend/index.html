<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      /* Failsafe UI Styling */
      #failsafe-ui {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #050505;
        color: #00f2ff;
        font-family: 'Inter', sans-serif;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
      }
      .reset-btn {
        background: linear-gradient(135deg, #00f2ff 0%, #a000ff 100%);
        border: none;
        color: #000;
        padding: 15px 30px;
        border-radius: 8px;
        font-weight: 900;
        cursor: pointer;
        margin-top: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
    </style>
    <script>
      // GLOBAL ERROR BOUNDARY PROTOCOL
      window.onerror = function(msg, url, line) {
        console.error("GLOBAL_CRASH:", msg, url, line);
        showFailsafe("RUNTIME_INTERFACE_ERROR: " + msg);
        return false;
      };

      function showFailsafe(reason) {
        const ui = document.getElementById('failsafe-ui');
        if (ui) {
          ui.style.display = 'flex';
          document.getElementById('fail-reason').innerText = reason;
        }
      }

      function hardReset() {
        // Clear all caches and reload
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for(let reg of regs) reg.unregister();
          });
        }
        window.location.reload(true);
      }

      // Detect "Static Black Screen" (Root empty for > 5s)
      window.addEventListener('load', function() {
        setTimeout(function() {
          const root = document.getElementById('root');
          if (root && root.innerHTML === "") {
            showFailsafe("NODE_SYNC_TIMEOUT: Interface failed to mount.");
          }
        }, 5000);
      });
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOT-CALL | PLATINUM v4.8.9</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Failsafe Error UI -->
    <div id="failsafe-ui">
      <div style="font-size: 3rem; margin-bottom: 20px;">⚠️</div>
      <h2 style="letter-spacing: 5px;">SYSTEM_HALTED</h2>
      <p id="fail-reason" style="opacity: 0.6; margin: 10px 0; font-family: monospace;"></p>
      <p style="max-width: 400px; font-size: 0.8rem; line-height: 1.5;">
        The neural interface encountered a fatal sync error. 
        This is likely due to stale browser cache.
      </p>
      <button class="reset-btn" onclick="hardReset()">PERFORM_HARD_RESET</button>
      <p style="margin-top: 20px; font-size: 0.6rem; opacity: 0.4;">KUNCI JAWABAN: Use CTRL + SHIFT + R if F5 is blocked by projector menu.</p>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
