<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<script>
			// Stable client-side version gate without forced reload loops.
			const CURRENT_VERSION = "1.0.3";
			const VERSION_KEY = "PROTOCOL_VERSION";

			if (localStorage.getItem(VERSION_KEY) !== CURRENT_VERSION) {
				localStorage.clear();
				sessionStorage.clear();
				localStorage.setItem(VERSION_KEY, CURRENT_VERSION);

				if ("caches" in window) {
					caches.keys().then((names) => {
						for (const name of names) caches.delete(name);
					});
				}
			}
		</script>
		<style>
			body {
				margin: 0;
				background: #050505;
				overflow: hidden;
				color: #fff;
				font-family: sans-serif;
			}

			#boot-loader {
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				background: #050505;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				z-index: 100000;
				text-align: center;
			}

			.loader-spin {
				width: 60px;
				height: 60px;
				border: 4px solid rgba(0, 242, 255, 0.1);
				border-top: 4px solid #00f2ff;
				border-radius: 50%;
				animation: spin 1s linear infinite;
				margin-bottom: 20px;
				box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
			}

			@keyframes spin {
				0% {
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(360deg);
				}
			}

			.version-tag {
				font-size: 0.7rem;
				color: rgba(255, 255, 255, 0.4);
				margin-top: 2rem;
				letter-spacing: 0.2rem;
			}
		</style>
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BOT-CALL | ROBOTIC ECOSYSTEM</title>
	</head>
	<body>
		<div id="boot-loader">
			<div class="loader-spin"></div>
			<h2 style="font-size: 1rem; color: #00f2ff; letter-spacing: 0.3rem;">INITIALIZING_STABLE_WORKSPACE</h2>
			<p class="version-tag">BOT-CALL v1.0.3 // BASE SEPOLIA TESTNET</p>
			<div style="background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.3); padding: 10px; margin-top: 20px; font-size: 10px; color: #ff4444; border-radius: 5px; width: 80%; max-width: 300px;">
				LEGAL: SYSTEM CONFIGURED FOR BASE SEPOLIA TESTNET ONLY. NO REAL VALUE ASSETS PERMITTED.
			</div>
		</div>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
